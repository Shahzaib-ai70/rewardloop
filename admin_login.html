<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RewardLoop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/notifications.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        
        /* Animated Background Particles */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(214, 48, 49, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(9, 132, 227, 0.1) 0%, transparent 20%);
            z-index: -1;
            animation: bgPulse 10s infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .text-3d {
            color: #d63031;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 
                0 1px 0 #b02627,
                0 2px 0 #942021,
                0 3px 0 #7a1b1c,
                0 4px 0 #5e1415,
                0 5px 0 #420e0f,
                0 6px 1px rgba(0,0,0,.1),
                0 0 5px rgba(0,0,0,.1),
                0 1px 3px rgba(0,0,0,.3),
                0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25),
                0 10px 10px rgba(0,0,0,.2),
                0 20px 20px rgba(0,0,0,.15);
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .subtitle-3d {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .admin-login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-color: rgba(214, 48, 49, 0.3);
        }

        .admin-login-card h2 {
            margin-bottom: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .admin-login-card .form-control {
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            transition: all 0.3s;
        }

        .admin-login-card .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: #d63031;
            box-shadow: 0 0 15px rgba(214, 48, 49, 0.3);
            outline: none;
        }

        .admin-login-card .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-admin {
            background: linear-gradient(135deg, #d63031 0%, #e17055 100%);
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(214, 48, 49, 0.3);
            margin-top: 10px;
        }

        .btn-admin:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(214, 48, 49, 0.4);
        }

        .back-link {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="google_translate_element" style="position: absolute; top: 20px; right: 80px; z-index: 1000;"></div>
    
    <h1 class="text-3d">RewardLoop</h1>
    <div class="subtitle-3d">Admin Control Center</div>

    <div class="admin-login-card">
        <div class="mb-4">
            <div style="width: 80px; height: 80px; background: rgba(214, 48, 49, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                <i class="fas fa-user-shield fa-3x" style="color: #d63031;"></i>
            </div>
        </div>
        <h2>Secure Login</h2>
        <form id="adminLoginForm">
            <input type="text" name="username" class="form-control" placeholder="Admin Username" required autocomplete="off">
            <input type="password" name="password" class="form-control" placeholder="Secure Password" required>
            <button type="submit" class="btn btn-admin">Access Dashboard</button>
        </form>
        <div class="mt-4">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;

            const safeToast = (msg, type) => {
                try { showToast(msg, type); } catch (_) {}
            };

            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 15000);
            let success = false;

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(data),
                    signal: controller.signal
                });

                const text = await res.text();
                let result = {};
                try { result = text ? JSON.parse(text) : {}; } catch { result = { error: text || 'Unexpected response' }; }

                if (res.ok && result && result.success) {
                    success = true;
                    safeToast('Welcome back, Admin!', 'success');
                    setTimeout(() => window.location.href = result.redirect || '/admin_dashboard.html', 500);
                    return;
                }

                safeToast((result && result.error) || 'Access Denied', 'error');
            } catch (err) {
                safeToast(err && err.name === 'AbortError' ? 'Request timeout' : 'Connection error', 'error');
            } finally {
                clearTimeout(timer);
                if (!success) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        });
    </script>
    <script src="js/translation.js"></script>
</body>
</html>
