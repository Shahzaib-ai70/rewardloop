<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - RewardLoop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/notifications.js"></script>
</head>
<body class="dashboard-body">
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-coins"></i> RewardLoop
            </div>
            <div class="close-sidebar">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="subscriptions.html"><i class="fas fa-crown"></i> Subscriptions</a></li>
            <li><a href="community.html"><i class="fas fa-comments"></i> Community</a></li>

            <li><a href="fund_transfer.html"><i class="fas fa-exchange-alt"></i> Fund Transfer</a></li>
            <li><a href="ads.html?tab=my-earnings"><i class="fas fa-dollar-sign"></i> My Earnings</a></li>
            <li><a href="ads.html"><i class="fas fa-ad"></i> All Ads</a></li>
            <li><a href="transactions.html"><i class="fas fa-history"></i> Transactions</a></li>
            <li><a href="withdraw.html"><i class="fas fa-money-check-alt"></i> Withdraw</a></li>
            <li><a href="referral.html"><i class="fas fa-users"></i> Referral</a></li>
            <li><a href="portfolios.html"><i class="fas fa-briefcase"></i> Portfolios</a></li>
            <li><a href="support.html"><i class="fas fa-headset"></i> Support</a></li>
            <li><a href="rewards.html"><i class="fas fa-gift"></i> Rewards</a></li>
            <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Log Out</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="dashboard-header">
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
            <div class="header-right">
                <div id="google_translate_element"></div>
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Change Password Content -->
        <div class="content-wrapper">
            <div class="settings-tabs">
                <a href="settings.html" class="tab-btn" style="text-decoration: none;">Settings</a>
                <button class="tab-btn active">Change Password</button>

            </div>

            <div class="card mb-4" style="border: none; box-shadow: none;">
                <div class="card-body" style="padding: 0;">
                    <h3 class="section-title">Change Password</h3>
                    
                    <form id="changePasswordForm">
                        <div class="form-group mb-4">
                            <label>New Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" class="form-control" id="newPassword" placeholder="New Password">
                                <i class="fas fa-eye-slash toggle-password"></i>
                            </div>
                        </div>
                        <div class="form-group mb-4">
                            <label>Confirm Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password">
                                <i class="fas fa-eye-slash toggle-password"></i>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-save mt-2"><i class="fas fa-key"></i> Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Toggle Sidebar for mobile
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });
        
        document.querySelector('.close-sidebar').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.remove('active');
        });

        // Password Toggle
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                } else {
                    input.type = 'password';
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                }
            });
        });

        // Handle Form Submit
        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match!', 'warning');
                return;
            }

            if (!newPassword) {
                showToast('Please enter a new password.', 'warning');
                return;
            }

            fetch('/api/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ newPassword }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast('Password changed successfully!', 'success');
                    document.getElementById('changePasswordForm').reset();
                } else {
                    showToast('Error changing password: ' + (data.error || 'Unknown error'), 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('An error occurred. Please try again.', 'error');
            });
        });
    </script>
    <script src="js/theme.js"></script>
    <script src="js/translation.js"></script>
</body>
</html>
