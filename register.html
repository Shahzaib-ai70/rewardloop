    <script>
        function updatePhoneCode() {
            const countrySelect = document.getElementById('country');
            const phoneCodeSpan = document.getElementById('phone-code');
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const code = selectedOption.getAttribute('data-code');
            
            if (code) {
                phoneCodeSpan.textContent = code;
            } else {
                phoneCodeSpan.textContent = '';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'warning');
                return;
            }

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;

            const safeToast = (msg, type) => {
                try { showToast(msg, type); } catch (_) {}
            };

            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 15000);
            let success = false;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(data),
                    signal: controller.signal
                });

                const text = await res.text();
                let result = {};
                try { result = text ? JSON.parse(text) : {}; } catch { result = { error: text || 'Unexpected response' }; }

                if (res.ok && result && result.success) {
                    success = true;
                    safeToast('Account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = result.redirect || '/dashboard.html', 500);
                    return;
                }

                safeToast((result && result.error) || 'Registration failed', 'error');
            } catch (err) {
                safeToast(err && err.name === 'AbortError' ? 'Request timeout' : 'Connection error', 'error');
            } finally {
                clearTimeout(timer);
                if (!success) {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }
        });
        
        // Initialize on load
        window.addEventListener('DOMContentLoaded', (event) => {
            updatePhoneCode();
            
            // Check for referral code in URL
            const urlParams = new URLSearchParams(window.location.search);
            const referralCode = urlParams.get('invite');
            if (referralCode) {
                const referralInput = document.querySelector('input[name="referral"]');
                if (referralInput) {
                    referralInput.value = referralCode;
                }
            }
        });
    </script>
