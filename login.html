﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RewardLoop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/notifications.js"></script>
</head>
<body class="auth-page">
    <!-- Navbar (Simplified) -->
    <nav class="navbar auth-navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-coins"></i> RewardLoop
            </div>
            <div class="nav-right">
                <div id="google_translate_element"></div>
                <div class="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome Back!</h3>
            </div>
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye-slash toggle-password"></i>
                    </div>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="keep-signed-in">
                    <label for="keep-signed-in">Keep signed in</label>
                </div>
                <button type="submit" class="btn btn-purple btn-block">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="link-primary">Sign Up</a></p>
                <a href="#" class="link-secondary">Forgot Password</a>
            </div>
        </div>
    </section>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            btn.disabled = true;

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = result.redirect, 1000);
                } else {
                    showToast(result.error || 'Invalid credentials', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            })
            .catch(err => {
                showToast('Connection error', 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });
    </script>
    <script src="js/theme.js"></script>
    <script src="js/translation.js"></script>
</body>
</html>
